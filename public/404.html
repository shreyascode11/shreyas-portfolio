<!doctype html>
<html lang="en" data-theme="dark">
<head>

  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100svh;
      display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
      gap: 1.5rem;
      padding: clamp(1.5rem, 5vw, 5rem);
      background: #0e0e0c; color: #edede6;
      font-family: 'Space Grotesk', Arial, sans-serif;
    }
    .code { font-family: 'Space Mono', monospace; color: #ff5c1a; letter-spacing: .08em; }
    h1 { font-size: clamp(2.5rem, 8vw, 6rem); line-height: .95; text-transform: uppercase; letter-spacing: -0.02em; max-width: 14ch; }
    p { color: #8a8a82; max-width: 40ch; }
    a {
      margin-top: .5rem;
      display: inline-block; color: #edede6; text-decoration: none;
      font-family: 'Space Mono', monospace; text-transform: uppercase; font-size: .8125rem; letter-spacing: .06em;
      border: 1px solid rgba(237,237,230,.2); border-radius: 999px; padding: 1em 1.8em;
      transition: all .3s ease;
    }
    a:hover { background: #edede6; color: #0e0e0c; }
  </style>
</head>
<body>
  <span class="code">404 — NOT FOUND</span>
